name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test
      - name: Release build
        run: cargo build --release
      - name: "Smoke: every example must check"
        run: ./target/release/cli check examples/*.cli
      - name: "Smoke: parse bench runs (numbers informational — CI runners are noisy)"
        run: cargo bench -p dotcli-parser
